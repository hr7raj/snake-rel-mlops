name: Snake RL MLOps CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: pytest -q

      - name: Smoke train
        run: python -m src.train --config config/default.json --episodes 10

      - name: Evaluate trained model
        run: python -m src.evaluate --config config/default.json --episodes 5

      - name: Check monitoring threshold
        run: python -m src.monitor --log monitoring/performance_log.csv --threshold 0.0

